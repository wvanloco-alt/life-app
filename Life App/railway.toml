[build]
# Railway will detect the Dockerfile automatically.
# This file exists to make Railway settings explicit and version-controlled.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway pings /api/health to confirm the app is responding before routing
# traffic. The endpoint is intentionally public (no auth required).
# Timeout is generous to allow apply-schema.js to finish before first request.
healthcheckPath = "/api/health"
healthcheckTimeout = 60

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
