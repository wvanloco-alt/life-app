[build]
# Railway will detect the Dockerfile automatically.
# This file exists to make Railway settings explicit and version-controlled.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Health check — Railway pings this to confirm the app is up.
# The /api/health route is intentionally public (no auth required).
healthcheckPath = "/api/health"
healthcheckTimeout = 30

# Restart policy: always restart on crash.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
